name: size-limit

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

env:
  CI: true
  # size-limit-action checks out and builds the base branch for comparison.
  RUSTFLAGS: '-C link-arg=--allow-undefined'
  TURBO_ENV_MODE: loose

jobs:
  size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm exec turbo build --filter=generaltranslation --filter=gt-i18n --filter='@generaltranslation/react-core' --filter=gt-react --filter=gt-tanstack-start --filter=gt-next

      - name: Check bundle sizes
        run: pnpm size
