name: Notify Slack of Community Pull Requests

on:
  pull_request_target:
    types: [opened]

permissions: {}

jobs:
  membership:
    name: Check organization membership
    if: github.event.pull_request.user.type != 'Bot'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      is_member: ${{ steps.check.outputs.is_member }}

    steps:
      - name: Generate organization membership token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.GT_MEMBERS_APP_CLIENT_ID }}
          private-key: ${{ secrets.GT_MEMBERS_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-members: read

      - name: Check organization membership
        id: check
        env:
          ORG_MEMBERS_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          set -u

          status=''
          # Read the short-lived token through stdin so it never appears in process arguments.
          if ! status="$(
            curl -q --config - <<EOF
          silent
          show-error
          proto = "=https"
          connect-timeout = 10
          max-time = 30
          output = "/dev/null"
          write-out = "%{http_code}"
          header = "Accept: application/vnd.github+json"
          header = "Authorization: Bearer ${ORG_MEMBERS_TOKEN}"
          header = "X-GitHub-Api-Version: 2022-11-28"
          url = "https://api.github.com/orgs/${GITHUB_REPOSITORY_OWNER}/members/${PR_AUTHOR}"
          EOF
          )"; then
            echo '::error::Could not query General Translation organization membership.'
            exit 1
          fi

          case "${status}" in
            204)
              echo 'is_member=true' >> "${GITHUB_OUTPUT}"
              ;;
            404)
              echo 'is_member=false' >> "${GITHUB_OUTPUT}"
              ;;
            *)
              echo "::error::Could not verify General Translation organization membership (HTTP ${status}). Check the GitHub App installation and its Members: read permission."
              exit 1
              ;;
          esac

  notify:
    name: Notify Slack
    needs: membership
    if: needs.membership.outputs.is_member == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a # v2.1.1
        with:
          errors: true
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          # PR titles are JSON-encoded below. PR bodies are intentionally excluded.
          payload: |
            {
              "text": ${{ toJSON(format('New community pull request #{0}', github.event.pull_request.number)) }},
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🌱 New community pull request"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "plain_text",
                    "text": ${{ toJSON(format('#{0}: {1}', github.event.pull_request.number, github.event.pull_request.title)) }},
                    "emoji": true
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": ${{ toJSON(format('Opened by <{0}|@{1}> • `{2}`', github.event.pull_request.user.html_url, github.event.pull_request.user.login, github.event.pull_request.author_association)) }}
                    }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Pull Request"
                      },
                      "url": ${{ toJSON(github.event.pull_request.html_url) }}
                    }
                  ]
                }
              ]
            }
