name: CI - Run Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - 'packages/*/CHANGELOG.md'
      - 'packages/*/package.json'
      - '.changeset/**'

env:
  CI: true
  CARGO_HTTP_MULTIPLEXING: false
  CARGO_NET_RETRY: 10
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        name: Install pnpm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Install dependencies
        run: pnpm install

      - name: Rebuild packages
        run: pnpm rebuild --filter='...[origin/${{ github.base_ref }}]'

      - name: Run lint
        run: pnpm lint

  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        name: Install pnpm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Install dependencies
        run: pnpm install

      - name: Rebuild packages
        run: pnpm rebuild --filter='...[origin/${{ github.base_ref }}]'

      - name: Build packages
        run: pnpm exec turbo build --filter='...[origin/${{ github.base_ref }}]' --filter='!gt-next-middleware-e2e' --filter='!./examples/*'

      - name: Run tests
        run: pnpm exec turbo test --filter='...[origin/${{ github.base_ref }}]' --filter='!gt-next-middleware-e2e' --filter='!./examples/*'

  test-builds:
    strategy:
      matrix:
        include:
          - os: windows-latest
            node: 20
            next: '16.1.6'
          - os: windows-latest
            node: 24
            next: '16.1.6'
          - os: ubuntu-latest
            node: 20
            next: '16.1.6'
          - os: ubuntu-latest
            node: 24
            next: '16.1.6'
          - os: macos-latest
            node: 20
            next: '16.1.6'
          - os: macos-latest
            node: 24
            next: '16.1.6'
          - os: ubuntu-latest
            node: 20
            next: '15.5.9'
          - os: ubuntu-latest
            node: 24
            next: '15.5.9'
          - os: ubuntu-latest
            node: 20
            next: '16.0.10'
          - os: ubuntu-latest
            node: 24
            next: '16.0.10'
    runs-on: ${{ matrix.os }}
    env:
      npm_config_store_dir: ${{ github.workspace }}/.pnpm-store

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        name: Install pnpm

      - name: Check if gt-next changed
        id: gt_next_changed
        shell: bash
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q "^packages/next/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
      - name: Setup Node.js
        if: steps.gt_next_changed.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'
      - name: Setup Rust
        if: steps.gt_next_changed.outputs.changed == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Install dependencies
        if: steps.gt_next_changed.outputs.changed == 'true'
        run: pnpm install

      - name: Use Next.js ${{ matrix.next }}
        if: steps.gt_next_changed.outputs.changed == 'true'
        run: pnpm --filter base --filter general-cases add next@${{ matrix.next }} --save-exact

      - name: Test Builds
        if: steps.gt_next_changed.outputs.changed == 'true'
        run: |
          pnpm exec turbo build --filter=base... --force
          pnpm exec turbo build:turbopack --filter=base... --force

          pnpm exec turbo build --filter=general-cases... --force
          pnpm exec turbo build:turbopack --filter=general-cases... --force

  test-cli-binaries:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
            binary: gt-linux-x64
          - os: ubuntu-latest
            arch: arm64
            binary: gt-linux-arm64
          - os: macos-latest
            arch: x64
            binary: gt-darwin-x64
          - os: macos-latest
            arch: arm64
            binary: gt-darwin-arm64
          - os: windows-latest
            arch: x64
            binary: gt-win32-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if CLI or Python extractor changed
        id: gt_cli_changed
        shell: bash
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -qE "^packages/(cli|python-extractor)/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - uses: pnpm/action-setup@v4
        if: steps.gt_cli_changed.outputs.changed == 'true'
        name: Install pnpm

      - name: Setup Node.js
        if: steps.gt_cli_changed.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Setup Bun
        if: steps.gt_cli_changed.outputs.changed == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        if: steps.gt_cli_changed.outputs.changed == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Install dependencies
        if: steps.gt_cli_changed.outputs.changed == 'true'
        run: pnpm install

      - name: Build packages
        if: steps.gt_cli_changed.outputs.changed == 'true'
        run: pnpm exec turbo build --filter='gt...'

      - name: Build CLI binaries
        if: steps.gt_cli_changed.outputs.changed == 'true'
        shell: bash
        run: |
          cd packages/cli
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            pnpm run build
            pnpm run build:bin:windows-x64
          else
            pnpm run build:bin:clean
          fi

      - name: Test CLI in test environment
        if: steps.gt_cli_changed.outputs.changed == 'true'
        shell: bash
        run: cd tests/apps/cli-test-app && pnpm install && pnpm gt --help

  size:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      RUSTFLAGS: '-C link-arg=--allow-undefined'
      TURBO_ENV_MODE: loose
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        name: Install pnpm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - uses: andresz1/size-limit-action@94bc357df29c36c8f8d50ea497c3e225c3c95d1d # v1.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          package_manager: pnpm
          script: pnpm exec size-limit --json

  run-tests:
    needs: [lint, tests, test-builds, test-cli-binaries, size]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All tests passed"
