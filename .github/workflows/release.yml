name: Release

on:
  push:
    branches:
      - main

permissions:
  id-token: write # Required for OIDC
  contents: write
  pull-requests: write
  packages: write

concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
  CI: true
jobs:
  release:
    if: github.ref_name == 'main'
    name: Release
    runs-on: ubuntu-latest
    environment:
      name: 'release'
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v4
        name: Install pnpm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Validate release versions
        if: startsWith(github.event.head_commit.message, '[ci] release')
        run: pnpm run check:release-versions

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Install Dependencies
        # not frozen since we are using workspaces & package versions will change
        run: pnpm install --no-frozen-lockfile

      - name: Build packages
        run: pnpm run build:release
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          publish: pnpm run release
          commit: '[ci] release'
          title: '[ci] release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger benchmark baseline update
        if: steps.changesets.outputs.published == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          event-type: release-published
          client-payload: '{"publishedPackages": ${{ steps.changesets.outputs.publishedPackages }}}'

      - name: Find release PR
        id: find-release-pr
        if: steps.changesets.outputs.published == 'true'
        run: |
          pr_url=$(gh pr list --state merged --search "[ci] release" --limit 1 --json url --jq '.[0].url // ""')
          echo "pr_url=$pr_url" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Format Slack release message
        id: format-slack
        if: steps.changesets.outputs.published == 'true'
        run: |
          published='${{ steps.changesets.outputs.publishedPackages }}'
          pr_url='${{ steps.find-release-pr.outputs.pr_url }}'

          # Build a bullet list of published packages
          packages=$(echo "$published" | jq -r '.[] | "• `\(.name)` → `\(.version)`"')

          # Compose the message
          if [ -n "$pr_url" ]; then
            message=$(printf '📦 *New packages published!*\n\n%s\n\n🔗 <%s|Release PR>\n\n<@U0AF0LK9ZDY>' "$packages" "$pr_url")
          else
            message=$(printf '📦 *New packages published!*\n\n%s\n\n<@U0AF0LK9ZDY>' "$packages")
          fi

          # Escape for JSON
          message_escaped=$(echo "$message" | jq -Rs .)
          echo "message=$message_escaped" >> $GITHUB_OUTPUT

      - name: Notify Slack of release
        if: steps.changesets.outputs.published == 'true'
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.MOSS_PAGER_SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "New packages published",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ${{ steps.format-slack.outputs.message }}
                  }
                }
              ]
            }

      # gt (primary CLI package, lives in packages/cli/)
      - name: Check if gt binary release is needed
        id: check-gt
        run: |
          published_packages='${{ steps.changesets.outputs.publishedPackages }}'
          version=$(jq -r .version packages/cli/package.json)

          if [ -n "$published_packages" ] && echo "$published_packages" | jq -e 'any(.[]; .name == "gt")' > /dev/null; then
            echo "should_release_bin=true" >> $GITHUB_OUTPUT
          elif npm view "gt@${version}" version > /dev/null 2>&1 && ! npm view "gt@${version}-bin.0" version > /dev/null 2>&1; then
            # A previous run published gt but failed before the binary
            # release landed; finish it on this run.
            echo "should_release_bin=true" >> $GITHUB_OUTPUT
          else
            echo "should_release_bin=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract gt version
        id: gt-version
        if: steps.check-gt.outputs.should_release_bin == 'true'
        run: |
          version=$(jq -er .version packages/cli/package.json)
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Build gt binaries
        if: steps.check-gt.outputs.should_release_bin == 'true'
        run: pnpm --filter gt run build:bin:clean

      - name: Upload gt binaries to R2
        if: steps.check-gt.outputs.should_release_bin == 'true'
        uses: ryand56/r2-upload-action@v1.4
        with:
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-bucket: ${{ secrets.R2_BUCKET_NAME }}
          source-dir: packages/cli/binaries
          destination-dir: cli/v${{ steps.gt-version.outputs.version }}

      - name: Upload gt binaries to R2 (latest)
        if: steps.check-gt.outputs.should_release_bin == 'true'
        uses: ryand56/r2-upload-action@v1.4
        with:
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-bucket: ${{ secrets.R2_BUCKET_NAME }}
          source-dir: packages/cli/binaries
          destination-dir: cli/latest

      # PyPI: gtx-cli (Python launcher with bundled gt binaries)
      - name: Setup Python
        if: steps.check-gt.outputs.should_release_bin == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Publish gtx-cli to PyPI
        if: steps.check-gt.outputs.should_release_bin == 'true'
        working-directory: packages/cli/pypi
        run: |
          python -m pip install --upgrade build twine
          python scripts/build_platform_wheels.py --version "${{ steps.gt-version.outputs.version }}" --source ../binaries --check --upload --skip-existing
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

      - name: Release gt platform packages to npm
        if: steps.check-gt.outputs.should_release_bin == 'true'
        working-directory: packages/cli
        run: |
          node ../../scripts/platform-packages.mjs generate
          # Platform packages must reach the registry before the gt bin
          # package that depends on them. The publish script skips versions
          # that already exist, so each retry resumes where it left off.
          for attempt in 1 2 3 4 5; do
            if node ../../scripts/platform-packages.mjs publish; then
              break
            fi
            if [ "$attempt" = 5 ]; then
              echo "Publishing gt platform packages failed after ${attempt} attempts"
              exit 1
            fi
            echo "Platform publish attempt ${attempt} failed, retrying in 30s"
            sleep 30
          done

      - name: Release gt binary to npm
        if: steps.check-gt.outputs.should_release_bin == 'true'
        run: |
          pnpm --filter gt run bin:prep
          bin_version="${{ steps.gt-version.outputs.version }}-bin.0"
          # The registry intermittently rejects the short-lived trusted
          # publishing token partway through these large uploads; each retry
          # is a fresh npm invocation and a fresh OIDC token exchange.
          for attempt in 1 2 3 4 5; do
            if pnpm --filter gt publish --tag bin --no-git-checks; then
              break
            fi
            if npm view "gt@${bin_version}" version > /dev/null 2>&1; then
              echo "gt@${bin_version} reached the registry despite the error"
              break
            fi
            if [ "$attempt" = 5 ]; then
              echo "Publishing gt@${bin_version} failed after ${attempt} attempts"
              exit 1
            fi
            echo "Publish attempt ${attempt} failed, retrying in 30s"
            sleep 30
          done
          pnpm --filter gt run bin:restore
          pnpm --filter gt run build:clean

      # gtx-cli (backward-compat wrapper, lives in packages/gtx-cli/)
      - name: Check if gtx-cli binary release is needed
        id: check-gtx-cli
        run: |
          published_packages='${{ steps.changesets.outputs.publishedPackages }}'
          version=$(jq -r .version packages/gtx-cli/package.json)

          if [ -n "$published_packages" ] && echo "$published_packages" | jq -e 'any(.[]; .name == "gtx-cli")' > /dev/null; then
            echo "should_release_bin=true" >> $GITHUB_OUTPUT
          elif npm view "gtx-cli@${version}" version > /dev/null 2>&1 && ! npm view "gtx-cli@${version}-bin.0" version > /dev/null 2>&1; then
            # A previous run published gtx-cli but failed before the binary
            # release landed; finish it on this run.
            echo "should_release_bin=true" >> $GITHUB_OUTPUT
          else
            echo "should_release_bin=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract gtx-cli version
        id: gtx-cli-version
        if: steps.check-gtx-cli.outputs.should_release_bin == 'true'
        run: |
          version=$(jq -er .version packages/gtx-cli/package.json)
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Build gtx-cli binaries
        if: steps.check-gtx-cli.outputs.should_release_bin == 'true'
        run: pnpm --filter gtx-cli run build:bin:clean

      - name: Upload gtx-cli binaries to R2
        if: steps.check-gtx-cli.outputs.should_release_bin == 'true'
        uses: ryand56/r2-upload-action@v1.4
        with:
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-bucket: ${{ secrets.R2_BUCKET_NAME }}
          source-dir: packages/gtx-cli/binaries
          destination-dir: gtx-cli/v${{ steps.gtx-cli-version.outputs.version }}

      - name: Upload gtx-cli binaries to R2 (latest)
        if: steps.check-gtx-cli.outputs.should_release_bin == 'true'
        uses: ryand56/r2-upload-action@v1.4
        with:
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-bucket: ${{ secrets.R2_BUCKET_NAME }}
          source-dir: packages/gtx-cli/binaries
          destination-dir: gtx-cli/latest

      - name: Release gtx-cli platform packages to npm
        if: steps.check-gtx-cli.outputs.should_release_bin == 'true'
        working-directory: packages/gtx-cli
        run: |
          node ../../scripts/platform-packages.mjs generate
          # Platform packages must reach the registry before the gtx-cli bin
          # package that depends on them. The publish script skips versions
          # that already exist, so each retry resumes where it left off.
          for attempt in 1 2 3 4 5; do
            if node ../../scripts/platform-packages.mjs publish; then
              break
            fi
            if [ "$attempt" = 5 ]; then
              echo "Publishing gtx-cli platform packages failed after ${attempt} attempts"
              exit 1
            fi
            echo "Platform publish attempt ${attempt} failed, retrying in 30s"
            sleep 30
          done

      - name: Release gtx-cli binary to npm
        if: steps.check-gtx-cli.outputs.should_release_bin == 'true'
        run: |
          pnpm --filter gtx-cli run bin:prep
          bin_version="${{ steps.gtx-cli-version.outputs.version }}-bin.0"
          # The registry intermittently rejects the short-lived trusted
          # publishing token partway through these large uploads; each retry
          # is a fresh npm invocation and a fresh OIDC token exchange.
          for attempt in 1 2 3 4 5; do
            if pnpm --filter gtx-cli publish --tag bin --no-git-checks; then
              break
            fi
            if npm view "gtx-cli@${bin_version}" version > /dev/null 2>&1; then
              echo "gtx-cli@${bin_version} reached the registry despite the error"
              break
            fi
            if [ "$attempt" = 5 ]; then
              echo "Publishing gtx-cli@${bin_version} failed after ${attempt} attempts"
              exit 1
            fi
            echo "Publish attempt ${attempt} failed, retrying in 30s"
            sleep 30
          done
          pnpm --filter gtx-cli run bin:restore
          pnpm --filter gtx-cli run build:clean

  odysseus-release:
    if: github.ref_name == 'odysseus'
    name: Odysseus Release
    runs-on: ubuntu-latest
    environment:
      name: 'release'
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Verify Odysseus prerelease mode
        run: |
          test -f .changeset/pre.json
          test "$(jq -r '.mode' .changeset/pre.json)" = "pre"
          test "$(jq -r '.tag' .changeset/pre.json)" = "odysseus"

      - uses: pnpm/action-setup@v4
        name: Install pnpm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Install Dependencies
        # not frozen since we are using workspaces & package versions will change
        run: pnpm install --no-frozen-lockfile

      - name: Build packages
        run: pnpm run build:release
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Create Odysseus Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: bash scripts/version-packages-odysseus.sh
          publish: pnpm run release
          commit: '[ci] odysseus release'
          title: '[ci] odysseus release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
