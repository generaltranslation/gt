packages:
  - packages/*
  - tests/apps/**/*
  - examples/*

enableGlobalVirtualStore: true
hoist: false

minimumReleaseAge: 2880

minimumReleaseAgeExclude:
  - '@generaltranslation/*'
  - gt-next
  - gt-react
  - gt-sanity
  - '@generaltranslation/format'
  - gt-i18n
  - gt
  - gtx-cli
  - generaltranslation
  - next
  - '@next/*'
  - gt-react-native
  - 'react'
  - 'react-dom'

catalog:
  '@babel/core': ^7.28.4
  '@types/node': ^22.13.5
  oxfmt: ^0.47.0
  oxlint: ^1.62.0
  tsdown: ^0.21.10
  tslib: ^2.8.1
  typescript: ^5.9.2
  vitest: ^3.2.4

packageExtensions:
  eslint-config-next@*:
    peerDependencies:
      next: '*'
  '@expo/cli@*':
    dependencies:
      metro-runtime: '*'
  size-limit@*:
    dependencies:
      '@size-limit/preset-small-lib': '*'

# Temporary bootstrap: compiler 1.3.28 was versioned on main but its npm publish
# is deadlocked (the Release workflow's own install cannot resolve ^1.3.28).
# Scope the pin to gt-next's dependency edge so workspace:* consumers keep
# their workspace links; remove once 1.3.28 is on npm.
overrides:
  'gt-next>@generaltranslation/compiler': 1.3.27
